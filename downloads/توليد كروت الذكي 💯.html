      left: 50%;
      transform: translateX(-50%);

    #eagle {
      width: 100px;
    }

    /* خلفية وهمية تشبه cmatrix */
    .matrix-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: -1;
      overflow: hidden;
    }

    .matrix-line {
      position: absolute;
      white-space: pre;
      color: lime;
      font-size: 14px;
      opacity: 0.1;
      animation: fall linear infinite;
    }

    @keyframes fall {
      0% { transform: translateY(-100%); opacity: 0.1; }
      100% { transform: translateY(100vh); opacity: 1; }
    }
  </style>

<script>
  function detectPattern(cards) {
    const length = cards[0].length;
    let pattern = [];

    for (let i = 0; i < length; i++) {
      const chars = cards.map(card => card[i]);
      const allSame = chars.every(c => c === chars[0]);
      if (allSame) {
        pattern.push({ type: 'fixed', value: chars[0] });
      } else {
        const isDigit = chars.every(c => /\d/.test(c));
        const isLower = chars.every(c => /[a-z]/.test(c));
        const isUpper = chars.every(c => /[A-Z]/.test(c));
        if (isDigit) pattern.push({ type: 'rand_digit' });
        else if (isLower) pattern.push({ type: 'rand_lower' });
        else if (isUpper) pattern.push({ type: 'rand_upper' });
        else pattern.push({ type: 'rand_mix' });
      }
    }

    return pattern;
  }

  function generateFromPattern(pattern) {
    return pattern.map(p => {
      if (p.type === 'fixed') return p.value;
      if (p.type === 'rand_digit') return Math.floor(Math.random() * 10);
      if (p.type === 'rand_lower') return String.fromCharCode(97 + Math.floor(Math.random() * 26));
      if (p.type === 'rand_upper') return String.fromCharCode(65 + Math.floor(Math.random() * 26));
      if (p.type === 'rand_mix') {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
        return chars.charAt(Math.floor(Math.random() * chars.length));
      }
    }).join('');
  }

  function generate() {
    const input = document.getElementById("examples").value.trim().split("\n").map(e => e.trim());
    const amount = parseInt(document.getElementById("amount").value);
    const resultDiv = document.getElementById("result");

    if (input.length < 3 || input.some(c => c.length !== input[0].length)) {
      resultDiv.innerText = "يرجى إدخال 3 كروت بنفس الطول والنمط.";
      return;
    }

    const pattern = detectPattern(input);
    let output = "";
    for (let i = 0; i < amount; i++) {
      output += generateFromPattern(pattern) + "\n";
    }

    resultDiv.innerText = output;
  }

  function copyToClipboard() {
    const text = document.getElementById("result").innerText;
    if (!text) {
      alert("لا توجد نتائج للنسخ!");
      return;
    }

    const textarea = document.createElement("textarea");
    textarea.value = text;
    document.body.appendChild(textarea);
    textarea.select();

    try {
      document.execCommand("copy");
      alert("تم نسخ الكروت!");
    } catch (err) {
      alert("حدث خطأ أثناء النسخ.");
    }

    document.body.removeChild(textarea);
  }

  // إنشاء تأثير خلفية cmatrix
  function createMatrixEffect() {
    const container = document.getElementById("matrix-bg");
    const width = window.innerWidth;
    for (let i = 0; i < 100; i++) {
      const line = document.createElement("div");
      line.className = "matrix-line";
      line.style.left = Math.random() * width + "px";
      line.style.animationDuration = 5 + Math.random() * 5 + "s";
      line.textContent = generateMatrixText();
      container.appendChild(line);
    }
  }

  function generateMatrixText() {
    const chars = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    let text = "";
    for (let i = 0; i < 20; i++) {
      text += chars.charAt(Math.floor(Math.random() * chars.length)) + "\n";
    }
    return text;
  }

  createMatrixEffect();

  // تحريك الطير الجمهوري مع حركة الماوس
  document.addEventListener('mousemove', e => {
    const eagle = document.getElementById('eagle-container');
    const centerX = window.innerWidth / 2;
    const centerY = window.innerHeight / 4;
    const maxMove = 30;

    let diffX = e.clientX - centerX;
    let diffY = e.clientY - centerY;

    diffX = Math.max(-maxMove, Math.min(maxMove, diffX));
    diffY = Math.max(-maxMove, Math.min(maxMove, diffY));

    eagle.style.transform = `translate(calc(-50% + ${diffX}px), ${diffY}px) scale(1.1)`;
  });
</script>
